<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Assignments</title>

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- GOOGLE FONT -->

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Outfit',sans-serif;
            background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
            min-height:100vh;
            overflow-x:hidden;
            color:white;
        }

        /* SIDEBAR */

        .sidebar{
            width:240px;
            height:100vh;
            position:fixed;
            left:0;
            top:0;
            background:rgba(2,6,23,0.95);
            backdrop-filter:blur(20px);
            padding-top:30px;
            border-right:1px solid rgba(255,255,255,0.08);
        }

        .sidebar h2{
            text-align:center;
            font-size:42px;
            font-weight:700;
            margin-bottom:50px;
            color:white;
        }

        .sidebar a{
            display:block;
            color:#cbd5e1;
            text-decoration:none;
            padding:15px 25px;
            margin:10px 15px;
            border-radius:14px;
            font-size:18px;
            font-weight:500;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:linear-gradient(to right,#3b82f6,#06b6d4);
            color:white;
            transform:translateX(6px);
        }

        /* CONTENT */

        .content{
            margin-left:260px;
            padding:40px;
        }

        .page-title{
            font-size:72px;
            font-weight:700;
            margin-bottom:35px;
            color:white;
        }

        /* UPLOAD BOX */

        .upload-box{
            background:linear-gradient(135deg,#9333ea,#6d28d9);
            border-radius:30px;
            padding:40px;
            color:white;
            margin-bottom:40px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.25);
        }

        .upload-box h2{
            font-size:42px;
            font-weight:700;
            margin-bottom:10px;
        }

        .upload-box p{
            color:#f3e8ff;
            font-size:17px;
        }

        .upload-box input{
            height:60px;
            border:none;
            border-radius:16px;
            padding:12px;
            margin-top:25px;
        }

        .upload-box input::file-selector-button{
            background:#7c3aed;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:10px;
            margin-right:12px;
        }

        .upload-btn{
            margin-top:25px;
            border:none;
            border-radius:14px;
            padding:14px 30px;
            font-size:17px;
            font-weight:600;
        }

        /* TABLE */

        .table-box{
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(18px);
            border-radius:30px;
            padding:35px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.25);
        }

        .table-box h3{
            font-size:42px;
            margin-bottom:30px;
            font-weight:700;
        }

        .table{
            color:white;
        }

        .table thead th{
            background:#111827 !important;
            color:white !important;
            font-size:18px;
            padding:18px !important;
            border:none;
        }

        .table tbody td{
            background:transparent !important;
            color:#e2e8f0 !important;
            padding:18px !important;
            border-bottom:1px solid rgba(255,255,255,0.08);
            font-size:16px;
        }

        .table tr:hover{
            background:rgba(255,255,255,0.04);
        }

        /* RESPONSIVE */

        @media(max-width:992px){

            .sidebar{
                width:100%;
                height:auto;
                position:relative;
                padding-bottom:20px;
            }

            .content{
                margin-left:0;
                padding:20px;
            }

            .page-title{
                font-size:42px;
            }

            .upload-box h2{
                font-size:30px;
            }

        }

    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <h2>
            Student
        </h2>

        <a href="student.html">Dashboard</a>

        <a href="profile.html">Profile</a>

        <a href="attendance.html">Attendance</a>

        <a href="marks.html">Marks</a>

        <a href="assignments.html">Assignments</a>

        <a href="index.html">Logout</a>

    </div>

    <!-- CONTENT -->

    <div class="content">
        <!-- TOP PROFILE BAR -->

        <!-- PAGE TITLE -->

        <h1 class="page-title">
            Assignments
        </h1>

        <!-- UPLOAD SECTION -->

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="upload-box">

                    <h2>
                        📂 Upload Assignment
                    </h2>

                    <p>
                        Submit your assignment files before deadline.
                    </p>

                    <input type="file" class="form-control">

                    <button class="btn btn-light upload-btn">
                        Upload Assignment
                    </button>

                </div>

            </div>

        </div>

        <!-- TABLE -->

        <div class="table-box">

            <h3>
                Submitted Assignments
            </h3>

            <div class="table-responsive">

                <table class="table table-dark align-middle">

                    <thead>

                        <tr>

                            <th>Subject</th>

                            <th>Assignment</th>

                            <th>Status</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr>

                            <td>Math</td>

                            <td>Algebra PDF</td>

                            <td>Pending</td>

                        </tr>

                        <tr>

                            <td>Physics</td>

                            <td>Lab Report</td>

                            <td>Submitted</td>

                        </tr>

                        <tr>

                            <td>Computer</td>

                            <td>Project File</td>

                            <td>Submitted</td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</body>
</html>
