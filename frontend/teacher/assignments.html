<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignments - Teacher</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f4f7fc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      background: linear-gradient(180deg, #5b2be0, #3d0db8);
      padding: 25px 20px;
      color: white;
      z-index: 100;
    }
    .sidebar h3 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 600;
    }
    .sidebar a {
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
      text-decoration: none;
      padding: 12px 15px;
      border-radius: 10px;
      margin-bottom: 8px;
      transition: 0.3s;
    }
    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,0.2);
    }
    .content {
      margin-left: 260px;
      padding: 25px 30px;
      min-height: 100vh;
    }
    .header-card {
      background: white;
      padding: 20px 25px;
      border-radius: 15px;
      margin-bottom: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .form-card, .submissions-card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .form-card h2, .submissions-card h4 {
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e9ecef;
    }
    .btn-submit {
      background: #5b2be0;
      border: none;
      padding: 10px 25px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
    .btn-submit:hover {
      background: #3d0db8;
    }
    .marks-input {
      width: 80px;
      display: inline-block;
    }
    .grade-input {
      width: 80px;
      text-align: center;
    }
    @media (max-width: 768px) {
      .sidebar { width: 80px; padding: 20px 10px; }
      .sidebar h3 { font-size: 0; }
      .sidebar h3 i { font-size: 24px; }
      .sidebar a span { display: none; }
      .content { margin-left: 80px; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3><i class="bi bi-person-workspace"></i> <span>Teacher</span></h3>
  <a href="teacher.html"><i class="bi bi-speedometer2"></i> <span>Dashboard</span></a>
  <a href="teacherprofile.html"><i class="bi bi-person-circle"></i> <span>Profile</span></a>
  <a href="attendance.html"><i class="bi bi-calendar-check"></i> <span>Attendance</span></a>
  <a href="assignments.html" class="active"><i class="bi bi-journal-text"></i> <span>Assignments</span></a>
  <a href="marks.html"><i class="bi bi-bar-chart-fill"></i> <span>Marksheet</span></a>
  <a href="announcements.html"><i class="bi bi-megaphone"></i> <span>Announcements</span></a>
  <a href="duetasks.html"><i class="bi bi-list-check"></i> <span>Due Tasks</span></a>
  <a href="#" onclick="logout(); return false;"><i class="bi bi-box-arrow-right"></i> <span>Logout</span></a>
</div>

<!-- MAIN CONTENT -->
<div class="content">
  <div class="header-card">
    <div>
      <h4 class="mb-0"><i class="bi bi-journal-text"></i> Assignments</h4>
      <small class="text-muted">Create and manage assignments</small>
    </div>
  </div>

  <!-- CREATE ASSIGNMENT FORM -->
  <div class="form-card">
    <h2><i class="bi bi-plus-circle"></i> Create New Assignment</h2>
    
    <div class="mb-3">
      <label class="form-label fw-bold">Subject</label>
      <select id="subject" class="form-select">
        <option value="">Loading subjects...</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">Assignment Title</label>
      <input type="text" id="title" class="form-control" placeholder="Enter assignment title">
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">Instructions / Description</label>
      <textarea id="description" class="form-control" rows="4" placeholder="Describe the assignment requirements..."></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label fw-bold">Due Date</label>
      <input type="date" id="dueDate" class="form-control">
    </div>

    <button class="btn-submit" onclick="createAssignment()">
      <i class="bi bi-send"></i> Post Assignment
    </button>
  </div>

  <!-- SUBMISSIONS SECTION -->
  <div class="submissions-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0"><i class="bi bi-file-check"></i> Student Submissions</h4>
      <button class="btn btn-outline-success btn-sm" onclick="loadSubmissions()">
        <i class="bi bi-arrow-repeat"></i> Refresh
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-hover">
        <thead class="table-primary">
          <tr>
            <th>Student ID</th>
            <th>Subject</th>
            <th>Assignment</th>
            <th>Submitted At</th>
            <th>File</th>
            <th>Marks (1–10)</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="submissionTable">
          <tr>
            <td colspan="7" class="text-center py-4 text-muted">No submissions yet</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API_URL = "https://academic-management-backend-biar.onrender.com/api";
const token = localStorage.getItem("token");

if (!token) {
  alert("Please login first");
  window.location.href = "login.html";
}

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

/* LOAD SUBJECTS*/
async function loadSubjects() {
  try {
    const response = await fetch(`${API_URL}/teacher/profile`, {
      headers: { "Authorization": "Bearer " + token }
    });

    const data = await response.json();
    const dropdown = document.getElementById("subject");
    dropdown.innerHTML = '<option value="">Select Subject</option>';

    const subjects = data.subjects || [];

    if (subjects.length === 0) {
      dropdown.innerHTML = '<option value="">No subjects assigned</option>';
      return;
    }

    subjects.forEach(sub => {
      const option = document.createElement("option");
      option.value = sub;
      option.textContent = sub;
      dropdown.appendChild(option);
    });

  } catch (err) {
    console.log(err);
    alert("Failed to load subjects");
  }
}

/* CREATE ASSIGNMENT*/
async function createAssignment() {
  const subject = document.getElementById("subject").value;
  const title = document.getElementById("title").value.trim();
  const description = document.getElementById("description").value.trim();
  const dueDate = document.getElementById("dueDate").value;

  if (!subject || !title || !description || !dueDate) {
    alert("Please fill all fields");
    return;
  }

  const teacher = JSON.parse(localStorage.getItem("teacher"));

  try {
    const response = await fetch(`${API_URL}/teacher/assignment`, {
      method: "POST",
      headers: { 
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        teacherId: teacher._id,
        title: title,
        description: description,
        dueDate: dueDate,
        subject: subject
      })
    });

    const data = await response.json();
    
    if (response.ok) {
      alert("✓ " + data.message);
      // Clear form
      document.getElementById("title").value = "";
      document.getElementById("description").value = "";
      document.getElementById("dueDate").value = "";
      // Load submissions
      loadSubmissions();
    } else {
      alert(data.message || "Assignment creation failed");
    }

  } catch (err) {
    console.error(err);
    alert("Assignment creation failed");
  }
}

/*LOAD SUBMISSIONS */
async function loadSubmissions() {
  try {
    const teacher = JSON.parse(localStorage.getItem("teacher"));
    
    if (!teacher) {
      console.log("No teacher found");
      return;
    }

    const response = await fetch(`${API_URL}/teacher/submissions/${teacher._id}`, {
      headers: { "Authorization": "Bearer " + token }
    });

    if (!response.ok) {
      throw new Error("Failed to load submissions");
    }

    const data = await response.json();
    const table = document.getElementById("submissionTable");
    const submissions = data.submissions || [];

    if (submissions.length === 0) {
      table.innerHTML = `
        <tr>
          <td colspan="7" class="text-center text-muted py-4">
            No submissions yet
           </td
        </tr>
      `;
      return;
    }

    let html = '';
    submissions.forEach(s => {
      html += `
        <tr>
          <td>${s.studentId || 'N/A'}</td</td
          <td>${s.subject || 'N/A'}</td</td
          <td>${s.title || 'N/A'}</td</td
          <td>${s.submittedAt ? new Date(s.submittedAt).toLocaleString() : 'N/A'}</td</td
          <td class="text-center">
            ${s.fileUrl ? `<a href="https://academic-management-backend-biar.onrender.com/${s.fileUrl}" target="_blank" class="btn btn-sm btn-info">📄 View</a>` : 'No file'}
          </td</td
          <td>
            <input type="number" id="marks-${s.submissionId}" class="form-control grade-input" 
                   min="1" max="10" step="1" 
                   value="${s.marks || ''}"
                   placeholder="1-10">
           </td</td
          <td class="text-center">
            <button class="btn btn-success btn-sm" onclick="saveMarks('${s.submissionId}')">
              <i class="bi bi-save"></i> Save
            </button>
          </td</td
        </tr>
      `;
    });

    table.innerHTML = html;

  } catch (err) {
    console.log(err);
    const table = document.getElementById("submissionTable");
    table.innerHTML = `
      <tr>
        <td colspan="7" class="text-center text-danger py-4">
          Failed to load submissions: ${err.message}
        </td
      </tr>
    `;
  }
}

/*SAVE MARKS*/
async function saveMarks(submissionId) {
  const marksInput = document.getElementById(`marks-${submissionId}`);
  const marks = marksInput.value;
  
  if (!marks) {
    alert("Please enter marks");
    return;
  }
  
  const grade = Number(marks);
  if (isNaN(grade) || grade < 1 || grade > 10) {
    alert("Grade must be between 1 and 10");
    marksInput.value = "";
    marksInput.focus();
    return;
  }
  
  const teacher = JSON.parse(localStorage.getItem("teacher"));
  
  try {
    const response = await fetch(`${API_URL}/teacher/grade/${submissionId}`, {
      method: "PUT",
      headers: { 
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        marks: grade,
        feedback: "",
        teacherId: teacher._id
      })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      alert("✓ " + data.message);
      loadSubmissions();
    } else {
      alert(data.message || "Failed to save grade");
    }
    
  } catch (err) {
    console.error(err);
    alert("Error saving grade: " + err.message);
  }
}

// Initialize
loadSubjects();
loadSubmissions();
</script>
</body>
</html>
