<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher - Marks Entry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 250px;
      height: 100vh;
      background: linear-gradient(180deg, #5b2be0, #3d0db8);
      padding: 30px 20px;
      color: white;
    }
    .sidebar a {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      text-decoration: none;
      padding: 12px 15px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.2); }
    .content { margin-left: 250px; padding: 30px; }
    .marks-input { width: 80px; text-align: center; }
    .table-container { max-height: 500px; overflow-y: auto; }
    .save-btn { padding: 4px 12px; }
  </style>
</head>
<body>

<div class="sidebar">
  <h3><i class="bi bi-megaphone"></i> <span>Teacher</span></h3>
  <a href="teacher.html"><i class="bi bi-speedometer2"></i> <span>Dashboard</span></a>
  <a href="teacherprofile.html"><i class="bi bi-person-circle"></i> <span>Profile</span></a>
  <a href="attendance.html"><i class="bi bi-calendar-check"></i> <span>Attendance</span></a>
  <a href="assignments.html"><i class="bi bi-journal-text"></i> <span>Assignments</span></a>
  <a href="marks.html"><i class="bi bi-bar-chart-fill"></i> <span>Marksheet</span></a>
  <a href="announcements.html" class="active"><i class="bi bi-megaphone"></i> <span>Announcements</span></a>
  <a href="duetasks.html"><i class="bi bi-list-check"></i> <span>Due Tasks</span></a>
  <a href="#" onclick="logout(); return false;">
  <i class="bi bi-box-arrow-right"></i> Logout
</a>
</div>

<div class="content">
  <h2>📝 Marks Entry</h2>
  
  <div id="alertMsg"></div>
  
  <!-- Filter Card -->
  <div class="card mb-3">
    <div class="card-body">
      <div class="row align-items-center">
        <div class="col-md-3">
          <label class="form-label fw-bold mb-0">Filter by Subject</label>
          <select id="subjectFilter" class="form-select mt-1">
            <option value="">All Subjects</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label fw-bold mb-0">Teacher</label>
          <input type="text" id="teacherName" class="form-control mt-1" readonly>
        </div>
        <div class="col-md-6 text-end">
          <button class="btn btn-success" id="saveAllBtn">
            <i class="bi bi-save-all"></i> Save All Changes
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Students Table -->
  <div class="card">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0"><i class="bi bi-people"></i> Student Marks Entry</h5>
    </div>
    <div class="card-body p-0">
      <div class="table-container">
        <table class="table table-bordered mb-0">
          <thead class="table-dark">
            <tr>
              <th style="width: 5%">#</th>
              <th style="width: 12%">Student ID</th>
              <th style="width: 18%">Student Name</th>
              <th style="width: 20%">Subject</th>
              <th style="width: 15%">MTT (0-30)</th>
              <th style="width: 15%">ETT (0-50)</th>
              <th style="width: 15%">Action</th>
            </tr>
          </thead>
          <tbody id="marksTableBody">
            <tr><td colspan="7" class="text-center py-4">Loading...<br><span class="text-muted">Please wait</span></td</tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = "https://academic-management-backend-biar.onrender.com/api";
const token = localStorage.getItem("token");
let allData = { students: [], teacherSubjects: [] };

if (!token) {
  alert("Please login first");
  window.location.href = "login.html";
}

function showAlert(message, type) {
  const alertDiv = document.getElementById('alertMsg');
  alertDiv.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show">${message}</div>`;
  setTimeout(() => alertDiv.innerHTML = '', 3000);
}

function getMarkValue(marks, subject, examType) {
  if (!marks || marks.length === 0) return '';
  const found = marks.find(m => m.subject === subject && m.examType === examType);
  return found ? found.marksObtained : '';
}

async function loadData() {
  try {
    const teacher = JSON.parse(localStorage.getItem("teacher"));
    document.getElementById("teacherName").value = teacher.name;
    
    const res = await fetch(`${API_URL}/teacher/marks/students/${teacher._id}`, {
      headers: { "Authorization": "Bearer " + token }
    });
    
    const data = await res.json();
    allData.students = data.students || [];
    allData.teacherSubjects = data.teacher?.subjects || [];
    
    // Update filter dropdown
    const filterSelect = document.getElementById("subjectFilter");
    filterSelect.innerHTML = '<option value="">All Subjects</option>';
    allData.teacherSubjects.forEach(sub => {
      filterSelect.innerHTML += `<option value="${sub}">${sub}</option>`;
    });
    
    renderTable();
    
  } catch (err) {
    console.error(err);
    document.getElementById("marksTableBody").innerHTML = `<tr><td colspan="7" class="text-danger text-center">Error: ${err.message}</td></tr>`;
  }
}

function renderTable() {
  const filterValue = document.getElementById("subjectFilter").value;
  const tbody = document.getElementById("marksTableBody");
  let rows = [];
  let serialNo = 1;
  
  allData.students.forEach(student => {
    const subjects = student.subjects || [];
    
    subjects.forEach(subject => {
      if (filterValue !== "" && subject.subjectName !== filterValue) return;
      
      const mttVal = getMarkValue(student.marks, subject.subjectName, "MTT");
      const ettVal = getMarkValue(student.marks, subject.subjectName, "ETT");
      
      rows.push(`
        <tr>
          <td class="text-center">${serialNo++}</td>
          <td>${student.studentId}</td>
          <td>${student.name}</td>
          <td><strong>${subject.subjectName}</strong></td>
          <td>
            <input type="number" class="form-control marks-input" 
                   id="mtt_${student._id}_${subject.subjectName}"
                   value="${mttVal}"
                   min="0" max="30" step="1">
          </td>
          <td>
            <input type="number" class="form-control marks-input" 
                   id="ett_${student._id}_${subject.subjectName}"
                   value="${ettVal}"
                   min="0" max="50" step="1">
          </td>
          <td class="text-center">
            <button class="btn btn-sm btn-primary save-btn" 
                    onclick="saveMarks('${student._id}', '${subject.subjectName}')">
              <i class="bi bi-save"></i> Save
            </button>
          </td>
        </tr>
      `);
    });
  });
  
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">
      ${filterValue ? `No students found for subject: ${filterValue}` : 'No data available'}
    </td></tr>`;
  } else {
    tbody.innerHTML = rows.join('');
  }
}

async function saveMarks(studentId, subject) {
  const mttInput = document.getElementById(`mtt_${studentId}_${subject}`);
  const ettInput = document.getElementById(`ett_${studentId}_${subject}`);
  const teacher = JSON.parse(localStorage.getItem("teacher"));
  
  try {
    if (mttInput && mttInput.value !== '') {
      const val = parseInt(mttInput.value);
      if (val >= 0 && val <= 30) {
        await saveAPI(studentId, subject, "MTT", val, 30, teacher._id);
      } else {
        showAlert(`MTT marks for ${subject} must be 0-30`, "warning");
        return;
      }
    }
    
    if (ettInput && ettInput.value !== '') {
      const val = parseInt(ettInput.value);
      if (val >= 0 && val <= 50) {
        await saveAPI(studentId, subject, "ETT", val, 50, teacher._id);
      } else {
        showAlert(`ETT marks for ${subject} must be 0-50`, "warning");
        return;
      }
    }
    
    showAlert(`Marks saved for ${subject}!`, "success");
    await loadData();
    
  } catch (err) {
    showAlert("Error: " + err.message, "danger");
  }
}

async function saveAllMarks() {
  const teacher = JSON.parse(localStorage.getItem("teacher"));
  let saved = 0;
  
  for (const student of allData.students) {
    const subjects = student.subjects || [];
    for (const subject of subjects) {
      const mttInput = document.getElementById(`mtt_${student._id}_${subject.subjectName}`);
      const ettInput = document.getElementById(`ett_${student._id}_${subject.subjectName}`);
      
      if (mttInput && mttInput.value !== '') {
        const val = parseInt(mttInput.value);
        if (!isNaN(val) && val >= 0 && val <= 30) {
          await saveAPI(student._id, subject.subjectName, "MTT", val, 30, teacher._id);
          saved++;
        }
      }
      if (ettInput && ettInput.value !== '') {
        const val = parseInt(ettInput.value);
        if (!isNaN(val) && val >= 0 && val <= 50) {
          await saveAPI(student._id, subject.subjectName, "ETT", val, 50, teacher._id);
          saved++;
        }
      }
    }
  }
  showAlert(`Saved ${saved} marks entries!`, "success");
  await loadData();
}

async function saveAPI(studentId, subject, examType, marks, maxMarks, teacherId) {
  const res = await fetch(`${API_URL}/teacher/marks/enter`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ studentId, subject, examType, marksObtained: marks, maxMarks, teacherId })
  });
  if (!res.ok) throw new Error(await res.text());
}

// Setup event listeners
document.getElementById("subjectFilter").addEventListener("change", () => renderTable());
document.getElementById("saveAllBtn").addEventListener("click", saveAllMarks);

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

loadData();
</script>
</body>
</html>
