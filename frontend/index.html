<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>College ERP System</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

</head>

<body class="login-body">

    <div class="overlay"></div>

    <div class="container">

        <div class="row min-vh-100 align-items-center">

            <!-- LEFT -->

            <div class="col-md-6">

                <div class="hero-section">

                    <h1>
                        College ERP System
                    </h1>

                    <p>
                        Smart platform to manage attendance, marks, assignments and student activities.
                    </p>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="col-md-6">

                <div class="portal-container">

                    <!-- STUDENT -->

                    <div class="portal-card">

                        <div class="portal-icon">
                            🎓
                        </div>

                        <h3>
                            Student Login
                        </h3>

                        <p>
                            Access attendance, marks, assignments and profile details.
                        </p>

                        <a href="student/studentlogin.html" class="btn btn-primary portal-btn">
                            Login as Student
                        </a>

                    </div>

                    <!-- TEACHER -->

                    <div class="portal-card">

                        <div class="portal-icon">
                            👨‍🏫
                        </div>

                        <h3>
                            Teacher Login
                        </h3>

                        <p>
                            Manage attendance, marks and academic activities.
                        </p>

                        <a href="teacher/teacher.html" class="btn btn-dark portal-btn">
                            Login as Teacher
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
