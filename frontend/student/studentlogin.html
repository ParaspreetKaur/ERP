<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Login</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
        body {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 20px;
            padding: 30px;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .login-title {
            font-weight: bold;
            color: #333;
        }

        .form-control {
            height: 50px;
            border-radius: 12px;
        }

        .btn-login {
            height: 50px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: #4e73df;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            font-size: 35px;
        }
    </style>
</head>
<body>

    <div class="card login-card">
        
        <div class="icon-box">
            <i class="bi bi-person-fill"></i>
        </div>

        <h2 class="text-center mb-4 login-title">
            Student Login
        </h2>

        <form id="loginForm">

            <div class="mb-3">
                <label class="form-label">Student ID</label>
                <input
                    type="text"
                    id="studentId"
                    class="form-control"
                    placeholder="Enter Student ID"
                    required
                />
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="Enter Password"
                    required
                />
            </div>

            <button
                type="submit"
                class="btn btn-primary w-100 btn-login"
            >
                Login
            </button>

        </form>

        <p class="text-center text-muted mt-4 mb-0">
            © 2026 Student Portal
        </p>
    </div>

    <script src="script.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>function logout(){localStorage.clear();window.location.replace("../index.html");}window.addEventListener("pageshow",function(event){if(event.persisted && !localStorage.getItem("token")){window.location.replace("../index.html");}});</script></body>
</html>
