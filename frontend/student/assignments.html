<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Student Assignments</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body class="bg-light">

<div class="container py-5">

  <div class="card shadow border-0 rounded-4 p-4">

    <h2 class="mb-4 text-primary">
      Student Assignments
    </h2>

    <table class="table table-hover table-bordered">

      <thead class="table-primary">
        <tr>
          <th>Assignment</th>
          <th>Subject</th>
          <th>Due Date</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="assignmentTable">

      </tbody>

    </table>

    <div class="alert alert-info mt-4">
      Student ID:
      <strong id="studentId"></strong>
    </div>

    <a href="student.html" class="btn btn-primary">
      Back to Dashboard
    </a>

  </div>

</div>

<script>

const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "studentlogin.html";
}

async function loadAssignments() {

  const res = await fetch(
    "http://localhost:5001/api/student/profile",
    {
      headers: {
        Authorization: `Bearer ${token}`
      }
    }
  );

  const student = await res.json();

  if (!student || student.message) {
    alert("Session expired. Please login again.");
    window.location.href = "studentlogin.html";
    return;
  }

  document.getElementById("studentId").innerText =
    student.studentId;

  const table =
    document.getElementById("assignmentTable");

  student.assignments.forEach(assign => {

    table.innerHTML += `
      <tr>
        <td>${assign.title}</td>
        <td>${assign.subject}</td>
        <td>${assign.dueDate}</td>
        <td>
          <span class="badge ${
            assign.status === "Submitted"
              ? "bg-success"
              : "bg-warning text-dark"
          }">
            ${assign.status}
          </span>
        </td>
      </tr>
    `;

  });

}

loadAssignments();

</script>

</body>
</html>
