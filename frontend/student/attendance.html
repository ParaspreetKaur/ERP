<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Attendance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f4f7fc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      background: linear-gradient(180deg, #0d6efd, #0a58ca);
      padding: 25px 20px;
      color: white;
      z-index: 100;
    }
    .sidebar h3 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: 600;
    }
    .sidebar a {
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
      text-decoration: none;
      padding: 12px 15px;
      border-radius: 10px;
      margin-bottom: 8px;
      transition: 0.3s;
    }
    .sidebar a:hover, .sidebar a.active {
      background: rgba(255,255,255,0.2);
    }
    .content {
      margin-left: 260px;
      padding: 25px 30px;
      min-height: 100vh;
    }
    .header-card {
      background: white;
      padding: 20px 25px;
      border-radius: 15px;
      margin-bottom: 25px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .attendance-table {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .attendance-table th {
      background: #1a1a2e;
      color: white;
      padding: 14px 12px;
      text-align: center;
      font-weight: 600;
    }
    .attendance-table td {
      padding: 12px;
      text-align: center;
      border-bottom: 1px solid #e9ecef;
      vertical-align: middle;
    }
    .attendance-table tr:hover {
      background: #f8f9fc;
    }
    .overall-row {
      background: #e8f0fe;
      font-weight: bold;
    }
    .overall-row td {
      border-top: 2px solid #0d6efd;
      font-weight: bold;
    }
    .percentage-high {
      color: #28a745;
      font-weight: bold;
    }
    .percentage-medium {
      color: #ffc107;
      font-weight: bold;
    }
    .percentage-low {
      color: #dc3545;
      font-weight: bold;
    }
    .present-count {
      color: #28a745;
      font-weight: bold;
    }
    .absent-count {
      color: #dc3545;
      font-weight: bold;
    }
    .refresh-btn {
      background: #0d6efd;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }
    .refresh-btn:hover {
      background: #0b5ed7;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h3><i class="bi bi-mortarboard-fill"></i> Student</h3>
  <a href="student.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
  <a href="profile.html"><i class="bi bi-person-circle"></i> Profile</a>
  <a href="attendance.html" class="active"><i class="bi bi-calendar-check"></i> Attendance</a>
  <a href="marks.html"><i class="bi bi-bar-chart-fill"></i> Marks</a>
  <a href="assignments.html"><i class="bi bi-journal-text"></i> Assignments</a>
  <a href="#" onclick="logout(); return false;"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

<div class="content">
  <div class="header-card">
    <div>
      <h4 class="mb-0"><i class="bi bi-calendar-check"></i> My Attendance Record</h4>
      <small class="text-muted">Subject-wise attendance summary</small>
    </div>
    <button class="refresh-btn" onclick="loadAttendance()">
      <i class="bi bi-arrow-repeat"></i> Refresh
    </button>
  </div>

  <div id="alertMsg"></div>

  <div class="attendance-table">
    <table class="table table-bordered mb-0">
      <thead>
        <tr>
          <th style="width: 8%">#</th>
          <th style="width: 32%">Subject</th>
          <th style="width: 15%">Present</th>
          <th style="width: 15%">Absent</th>
          <th style="width: 15%">Total Lectures</th>
          <th style="width: 15%">Attendance %</th>
        </tr>
      </thead>
      <tbody id="attendanceBody">
        <tr>
          <td colspan="6" class="text-center py-4">
            <div class="spinner-border text-primary" role="status"></div>
            <br>Loading attendance data...
          </td>
        </tr>
      </tbody>
      <tfoot id="attendanceFooter" style="display: none;">
        <tr>
          <td colspan="2"><strong>Overall Total</strong></td>
          <td class="text-center"><strong id="totalPresent">0</strong></td>
          <td class="text-center"><strong id="totalAbsent">0</strong></td>
          <td class="text-center"><strong id="totalLectures">0</strong></td>
          <td class="text-center"><strong id="overallPercentage">0%</strong></td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<script>
const API_URL = "https://academic-management-backend-biar.onrender.com/api";
const token = localStorage.getItem("token");

if (!token) {
  alert("Please login first");
  window.location.href = "../studentlogin.html";
}

function showAlert(message, type) {
  const alertDiv = document.getElementById('alertMsg');
  alertDiv.innerHTML = `<div class="alert alert-${type} alert-dismissible fade show">${message}</div>`;
  setTimeout(() => alertDiv.innerHTML = '', 3000);
}

function logout() {
  localStorage.clear();
  window.location.href = "studentlogin.html";
}

function getPercentageClass(percentage) {
  if (percentage >= 75) return 'percentage-high';
  if (percentage >= 60) return 'percentage-medium';
  return 'percentage-low';
}

async function loadAttendance() {
  try {
    const response = await fetch(`${API_URL}/student/attendance`, {
      headers: { "Authorization": "Bearer " + token }
    });
    
    const data = await response.json();
    
    if (!response.ok) throw new Error(data.message);
    
    const attendance = data.attendance || [];
    
    if (attendance.length === 0) {
      document.getElementById("attendanceBody").innerHTML = `
        <tr>
          <td colspan="6" class="text-center py-4 text-muted">No attendance records found</td>
        </tr>
      `;
      document.getElementById("attendanceFooter").style.display = "none";
      return;
    }
    
    // Calculate subject-wise stats
    const subjectStats = {};
    attendance.forEach(record => {
      const subject = record.subject;
      if (!subjectStats[subject]) {
        subjectStats[subject] = { present: 0, absent: 0, total: 0 };
      }
      subjectStats[subject].total++;
      if (record.status === "Present") {
        subjectStats[subject].present++;
      } else {
        subjectStats[subject].absent++;
      }
    });
    
    // Calculate overall totals
    let grandPresent = 0;
    let grandAbsent = 0;
    let grandTotal = 0;
    
    let html = '';
    let serial = 1;
    
    // Sort subjects alphabetically
    const sortedSubjects = Object.keys(subjectStats).sort();
    
    for (const subject of sortedSubjects) {
      const stats = subjectStats[subject];
      const percentage = ((stats.present / stats.total) * 100).toFixed(2);
      const percentClass = getPercentageClass(parseFloat(percentage));
      
      grandPresent += stats.present;
      grandAbsent += stats.absent;
      grandTotal += stats.total;
      
      html += '<tr>';
      html += '<td class="text-center">' + serial + '</td>';
      html += '<td class="text-start"><strong>' + subject + '</strong></td>';
      html += '<td class="text-center present-count">' + stats.present + '</td>';
      html += '<td class="text-center absent-count">' + stats.absent + '</td>';
      html += '<td class="text-center">' + stats.total + '</td>';
      html += '<td class="text-center ' + percentClass + '">' + percentage + '%</td>';
      html += '</tr>';
      
      serial++;
    }
    
    const overallPercentage = grandTotal > 0 ? ((grandPresent / grandTotal) * 100).toFixed(2) : 0;
    const overallClass = getPercentageClass(parseFloat(overallPercentage));
    
    document.getElementById("attendanceBody").innerHTML = html;
    document.getElementById("attendanceFooter").style.display = "table-footer-group";
    document.getElementById("totalPresent").innerHTML = grandPresent;
    document.getElementById("totalAbsent").innerHTML = grandAbsent;
    document.getElementById("totalLectures").innerHTML = grandTotal;
    document.getElementById("overallPercentage").innerHTML = '<span class="' + overallClass + '">' + overallPercentage + '%</span>';
    
  } catch (err) {
    console.error(err);
    document.getElementById("attendanceBody").innerHTML = `
      <tr>
        <td colspan="6" class="text-center text-danger py-4">Error: ${err.message}</td>
      </tr>
    `;
    document.getElementById("attendanceFooter").style.display = "none";
  }
}

loadAttendance();
</script>
</body>
</html>
