<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #eef2f7, #f7f9fc);
  font-family: Arial, sans-serif;
}

/* MAIN CARD */
.profile-card {
  max-width: 850px;
  margin: 40px auto;
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* HEADER */
.profile-header {
  background: linear-gradient(135deg, #0d6efd, #4f8cff);
  color: white;
  text-align: center;
  padding: 35px 20px;
}

.profile-img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid white;
  margin-bottom: 15px;
  background: white;
}

/* NAME */
.profile-header h3 {
  margin-bottom: 5px;
}

/* CONTENT */
.profile-body {
  padding: 30px;
}

/* INFO CARD */
.info-box {
  background: #f8f9fc;
  border-radius: 14px;
  padding: 18px;
  transition: 0.3s;
  height: 100%;
}

.info-box:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.info-title {
  font-size: 13px;
  color: #6c757d;
  margin-bottom: 5px;
}

.info-value {
  font-size: 18px;
  font-weight: 600;
  color: #212529;
}

/* BUTTON */
.btn-back {
  margin-top: 25px;
  width: 100%;
  padding: 12px;
  border-radius: 12px;
}

</style>
</head>

<body>

<div class="profile-card">

  <!-- HEADER -->
  <div class="profile-header">

    <img id="studentImage"
         class="profile-img"
         src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

    <h3 id="studentName">Student Name</h3>
    <p id="studentCourse" class="mb-0"></p>

  </div>

  <!-- BODY -->
  <div class="profile-body">

    <div class="row g-3">

      <div class="col-md-6">
        <div class="info-box">
          <div class="info-title">Student ID</div>
          <div class="info-value" id="studentId"></div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="info-box">
          <div class="info-title">Email</div>
          <div class="info-value" id="studentEmail"></div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="info-box text-center">
          <div class="info-title">CGPA</div>
          <div class="info-value" id="studentCgpa"></div>
        </div>
      </div>

    </div>

    <a href="student.html" class="btn btn-primary btn-back">
      Back to Dashboard
    </a>

  </div>
</div>

<script>

const token = localStorage.getItem("token");

if (!token) {
  window.location.href = "studentlogin.html";
}

async function loadProfile() {

  const res = await fetch("http://localhost:5001/api/student/profile", {
    headers: { Authorization: `Bearer ${token}` }
  });

  if (!res.ok) {
    alert("Session expired. Please login again.");
    window.location.href = "studentlogin.html";
    return;
  }

  const student = await res.json();

  document.getElementById("studentName").innerText = student.name;
  document.getElementById("studentCourse").innerText = student.course;
  document.getElementById("studentId").innerText = student.studentId;
  document.getElementById("studentEmail").innerText = student.email;
  document.getElementById("studentCgpa").innerText = student.cgpa;

  document.getElementById("studentImage").src =
    student.image || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
}

loadProfile();

</script>

</body>
</html>
